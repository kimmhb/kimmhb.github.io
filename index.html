<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김현보 수학</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <style>
        /* (기존 CSS 스타일 동일 - 생략 없이 그대로 유지) */
        :root { --bg: #F8FAFC; --surface: #FFFFFF; --primary: #6366F1; --primary-hover: #4F46E5; --text-main: #0F172A; --text-muted: #64748B; --border-color: rgba(0, 0, 0, 0.05); --border-width: 1px; --shadow: 0 10px 40px rgba(0, 0, 0, 0.04); --btn-shadow: 0 8px 16px rgba(99, 102, 241, 0.2); --radius: 24px; --btn-radius: 16px; --glass-bg: rgba(255, 255, 255, 0.7); }
        [data-theme="dark"] { --bg: #0F172A; --surface: #1E293B; --primary: #38BDF8;  --primary-hover: #0284C7; --text-main: #F8FAFC; --text-muted: #94A3B8; --border-color: rgba(255, 255, 255, 0.1); --border-width: 1px; --shadow: 0 10px 40px rgba(0, 0, 0, 0.4); --btn-shadow: 0 8px 16px rgba(56, 189, 248, 0.2); --radius: 24px; --btn-radius: 16px; --glass-bg: rgba(15, 23, 42, 0.8); }
        [data-theme="brutal"] { --bg: #FFFDF0;  --surface: #FFFFFF; --primary: #FF3366;  --primary-hover: #E60039; --text-main: #000000; --text-muted: #333333; --border-color: #000000; --border-width: 3px; --shadow: 6px 6px 0px #000000;  --btn-shadow: 4px 4px 0px #000000; --radius: 0px;  --btn-radius: 0px; --glass-bg: #FFFDF0;  }
        body { font-family: 'Pretendard Variable', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); overflow-x: hidden; min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease; }
        header { position: sticky; top: 0; z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: var(--border-width) solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; transition: all 0.3s ease; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); cursor: pointer; }
        .theme-switcher { display: flex; gap: 5px; background: var(--surface); padding: 4px; border-radius: 20px; border: var(--border-width) solid var(--border-color); }
        .theme-switcher button { background: transparent; border: none; cursor: pointer; font-size: 1rem; padding: 5px; border-radius: 50%; transition: transform 0.2s; }
        .theme-switcher button:hover { transform: scale(1.2); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav button { background: transparent; border: none; color: var(--text-main); font-size: 0.95rem; cursor: pointer; padding: 8px 16px; font-weight: 600; border-radius: var(--btn-radius); transition: all 0.2s ease; }
        nav button:hover { color: var(--primary); background: var(--border-color); }
        #loginNavBtn { background: var(--primary); color: #ffffff; border: var(--border-width) solid var(--border-color); box-shadow: var(--btn-shadow); }
        #loginNavBtn:hover { background: var(--primary-hover); }
        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeInScale 0.4s ease-out; }
        @keyframes fadeInScale { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hero { text-align: center; padding: 80px 0 40px 0; }
        .hero h2 { font-size: 3.5rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -2px; }
        .hero p { font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }
        .content-card { background: var(--surface); padding: 32px; border-radius: var(--radius); box-shadow: var(--shadow); border: var(--border-width) solid var(--border-color); margin-bottom: 24px; transition: all 0.3s ease; }
        .content-card h3 { margin-top: 0; font-size: 1.4rem; font-weight: 800; }
        .board-badge { display: inline-block; background: var(--primary); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 15px; box-shadow: var(--btn-shadow); }
        .auth-box { max-width: 380px; margin: 40px auto; padding: 40px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: var(--border-width) solid var(--border-color); display: flex; flex-direction: column; gap: 20px; }
        input[type="text"], input[type="password"] { padding: 16px 20px; border: var(--border-width) solid var(--border-color); border-radius: var(--btn-radius); font-size: 1rem; background: var(--bg); color: var(--text-main); transition: 0.3s; font-family: inherit; }
        input:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 16px; background: var(--primary); color: #ffffff; border: var(--border-width) solid var(--border-color); border-radius: var(--btn-radius); font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: var(--btn-shadow); transition: 0.2s; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); background: var(--primary-hover); }
        .btn-outline { background: transparent; color: var(--text-main); box-shadow: none; }
        .btn-outline:hover { background: var(--bg); transform: translateY(0); }
        .notice-list-item { background: var(--surface); padding: 24px; border-radius: var(--radius); margin-bottom: 16px; border: var(--border-width) solid var(--border-color); box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s ease; }
        .notice-list-item:hover { transform: translateY(-2px); border-color: var(--primary); }
        .notice-list-item strong { font-size: 1.1rem; color: var(--text-main); transition: color 0.2s; }
        .notice-list-item:hover strong { color: var(--primary); }
        .notice-date { font-size: 0.9rem; color: var(--text-muted); background: var(--bg); padding: 6px 12px; border-radius: 12px; }
        .notice-detail-header { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px dashed var(--border-color); }
        .notice-detail-header h3 { font-size: 1.8rem; margin: 0 0 10px 0; color: var(--primary); }
        .notice-detail-content { line-height: 1.8; font-size: 1.05rem; color: var(--text-muted); min-height: 150px; }
/* =======================================================
   📱 모바일 반응형 (화면 너비 768px 이하일 때 자동 적용)
   ======================================================= */
@media (max-width: 768px) {
    /* 상단 헤더: 로고와 메뉴를 위아래로 배치하고 간격 축소 */
    header {
        flex-direction: column;
        gap: 12px;
        padding: 12px 5%;
    }
    nav {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 4px;
    }
    nav button {
        padding: 8px 12px;
        font-size: 0.9rem;
    }

    /* 전체 여백 및 메인 타이틀 축소 */
    .container {
        margin: 30px auto;
    }
    .hero {
        padding: 40px 0 20px 0;
    }
    .hero h2 {
        font-size: 2.2rem; /* 기존 3.5rem에서 축소 */
        margin-bottom: 15px;
    }
    .hero p {
        font-size: 1rem;
    }
    
    /* 각 섹션 제목 크기 축소 */
    .section h2 {
        font-size: 1.5rem !important;
        margin-bottom: 20px !important;
    }

    /* 카드 및 입력폼(로그인/가입) 여백과 폰트 축소 */
    .content-card {
        padding: 24px;
    }
    .content-card h3 {
        font-size: 1.2rem;
    }
    .auth-box {
        padding: 24px;
        margin: 20px auto;
        gap: 16px;
    }
    input[type="text"], input[type="password"] {
        padding: 12px 16px;
        font-size: 0.95rem;
    }
    .btn {
        padding: 14px;
        font-size: 1rem;
    }

    /* 게시판 및 공지사항 레이아웃 최적화 */
    .notice-list-item {
        padding: 16px;
        flex-direction: column; /* 제목과 날짜를 위아래로 배치 */
        align-items: flex-start;
        gap: 8px;
    }
    .notice-list-item strong {
        font-size: 1rem;
    }
    .notice-date {
        font-size: 0.8rem;
        padding: 4px 8px;
    }
    .notice-detail-header h3 {
        font-size: 1.4rem;
    }
    .notice-detail-content {
        font-size: 0.95rem;
    }
}
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo" onclick="navigate('home')" title="메인으로 가기">김현보 수학</div>
            <div class="theme-switcher">
                <button onclick="setTheme('default')" title="모던 테마">✨</button>
                <button onclick="setTheme('dark')" title="다크 모드">🌙</button>
                <button onclick="setTheme('brutal')" title="네오 브루탈리즘">🎨</button>
            </div>
        </div>
        <nav>
            <button onclick="navigate('noticeBoard', true)">공지사항</button>
            <button onclick="navigate('videos', true)">수업 영상</button>
            <button onclick="navigate('materials', true)">학습 자료</button>
            <button onclick="navigate('login')" id="loginNavBtn">로그인</button>
        </nav>
    </header>

    <div class="container">
        <div id="home" class="section active">
            <div class="hero">
                <h2>POV<br>Point of View</h2>
                <p>'실전 관점'으로 접근하는 수학</p>
            </div>
        </div>

        <div id="noticeBoard" class="section">
            <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 30px;">📢 공지사항</h2>
            <div id="publicNoticeList"></div>
        </div>
        <div id="noticeDetail" class="section">
            <button class="btn btn-outline" style="margin-bottom: 20px; padding: 10px 20px;" onclick="showSection('noticeBoard')">← 목록으로 돌아가기</button>
            <div class="content-card" style="padding: 40px;">
                <div class="notice-detail-header">
                    <h3 id="detailTitle"></h3>
                    <span id="detailDate" class="notice-date"></span>
                </div>
                <div id="detailContent" class="notice-detail-content"></div>
            </div>
        </div>

        <div id="videos" class="section">
            <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 30px;">수업 영상</h2>
            <div id="videosContentContainer"></div>
        </div>
        <div id="materials" class="section">
            <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 30px;">학습 자료</h2>
            <div id="materialsContentContainer"></div>
        </div>

        <div id="login" class="section">
            <div class="auth-box">
                <h2 style="text-align: center; font-weight: 900; margin:0;">응원합니다!</h2>
                <input type="text" placeholder="아이디" id="loginId">
                <input type="password" placeholder="비밀번호 (6자리 이상)" id="loginPw">
                <button class="btn" onclick="performLogin()" id="loginSubmitBtn">로그인</button>
                <div style="text-align: center; font-size: 14px; color: var(--text-muted);">
                    계정이 없으신가요? <a onclick="navigate('signup')" style="color: var(--primary); cursor: pointer; font-weight: 600;">회원가입</a>
                </div>
            </div>
        </div>

        <div id="signup" class="section">
            <div class="auth-box">
                <h2 style="text-align: center; font-weight: 900; margin:0;">Get Started</h2>
                <input type="text" placeholder="이름 (예: 홍길동)" id="signupName">
                <input type="text" placeholder="입장 코드 입력 (필수)" id="signupCode">
                <input type="text" placeholder="아이디 생성 (영문/숫자)" id="signupId">
                <input type="password" placeholder="비밀번호 생성 (6자리 이상)" id="signupPw">
                <button class="btn" onclick="performSignup()" id="signupSubmitBtn">계정 만들기</button>
                <div style="text-align: center; font-size: 14px; color: var(--text-muted);">
                    이미 계정이 있나요? <a onclick="navigate('login')" style="color: var(--primary); cursor: pointer; font-weight: 600;">로그인</a>
                </div>
            </div>
        </div>
    </div>

    <script src="./file_list.js"></script>

    <script type="module">
        // Firebase 기능 가져오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

       
         const firebaseConfig = {
   		apiKey: "AIzaSyAf7Oez1X8lja7uTIsGs_PRda4aMjWYcqA",
  		authDomain: "kimmhb.firebaseapp.com",
    		projectId: "kimmhb",
   		storageBucket: "kimmhb.firebasestorage.app",
    		messagingSenderId: "760747546538",
    		appId: "1:760747546538:web:266db9e9daab37a8467dd3"
  	};

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // =====================================================================
        // 💡 [관리자 설정 영역]
        // =====================================================================
        const validCodes = ['class101', 'class102', 'class103', 'class201', 'class202', 'class203'];

        const notices = [
            { title: "notices test2 : LIFO implementation 🎉", content: "appears after clicking the button", date: "2026-05-01" },
            { title: "notices test with some icons 📅", content: "notices = [ {}, {}, ... ].", date: "2026-06-10" }
        ];

        const courseData = {
            'class101': { boardName: '공통수학2 심화', videos: [{ title: '[TEST]', link: 'https://www.youtube.com/watch?v=MYGj54xrdoY', desc: '심화 문제 풀이' }] },
            'class102': { boardName: '대수 심화', videos: [{ title: '지수/로그함수 고난도', link: 'https://youtube.com', desc: '심화 특강' }] }
            // 필요한 과정 계속 추가...
        };

        // 전역 상태 변수
        let isLoggedIn = false;
        let currentUser = null; // 파이어베이스 DB에서 가져온 유저 정보(이름, 입장코드 등) 저장
        let pendingTarget = null;

        // 💡 파이어베이스 로그인 상태 감지 (새로고침 시 자동 실행됨)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 로그인 되어있다면 DB에서 추가 정보(이름, 코드) 가져오기
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    currentUser = docSnap.data();
                    isLoggedIn = true;
                    
                    const btn = document.getElementById('loginNavBtn');
                    btn.innerText = "로그아웃";
                    btn.onclick = () => window.performLogout();
                }
            } else {
                // 로그아웃 상태
                isLoggedIn = false;
                currentUser = null;
                const btn = document.getElementById('loginNavBtn');
                btn.innerText = "로그인";
                btn.onclick = () => window.navigate('login');
            }
        });

        // =====================================================================
        // UI & 네비게이션 함수 (type="module" 이므로 window 객체에 연결해야 HTML에서 사용 가능)
        // =====================================================================
        
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            window.setTheme(savedTheme);
            window.renderNotices();
        };

        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        };

        window.navigate = function(targetId, requiresAuth = false) {
            if (requiresAuth && !isLoggedIn) {
                alert("🔒 회원가입 및 로그인 후 이용 가능한 서비스입니다.");
                pendingTarget = targetId;
                window.showSection('login');
                return;
            }
            window.showSection(targetId);
        };

        window.showSection = function(targetId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (targetId === 'videos') window.renderDynamicCourses('videos');
            if (targetId === 'materials') window.renderDynamicCourses('materials');
        };

        // =====================================================================
        // 🚀 파이어베이스 회원가입 & 로그인 로직
        // =====================================================================

        window.performSignup = async function() {
            const name = document.getElementById('signupName').value.trim();
            const code = document.getElementById('signupCode').value.trim();
            const id = document.getElementById('signupId').value.trim();
            const pw = document.getElementById('signupPw').value.trim();

            if (!name || !code || !id || !pw) return alert("모든 빈칸을 채워주세요!");
            if (!validCodes.includes(code)) return alert("❌ 유효하지 않은 입장 코드입니다.");
            if (pw.length < 6) return alert("비밀번호는 최소 6자리 이상이어야 합니다.");

            // 아이디를 가상의 이메일로 변환
            const dummyEmail = `${id}@kimmath.com`;
            const btn = document.getElementById('signupSubmitBtn');
            btn.innerText = "가입 처리 중...";
            btn.disabled = true;

            try {
                // 1. 파이어베이스 Auth에 계정 생성
                const userCredential = await createUserWithEmailAndPassword(auth, dummyEmail, pw);
                const user = userCredential.user;

                // 2. Firestore DB에 학생 부가 정보(이름, 입장코드) 저장
                await setDoc(doc(db, "users", user.uid), {
                    userId: id,
                    name: name,
                    code: code,
                    createdAt: new Date().toISOString()
                });

                alert("회원가입이 완료되었습니다. 🥳");
                
                // 폼 초기화
                document.getElementById('signupName').value = '';
                document.getElementById('signupCode').value = '';
                document.getElementById('signupId').value = '';
                document.getElementById('signupPw').value = '';

                window.showSection('login');
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("이미 존재하는 아이디입니다.");
                } else {
                    alert("회원가입 오류: " + error.message);
                }
            } finally {
                btn.innerText = "계정 만들기";
                btn.disabled = false;
            }
        };

        window.performLogin = async function() {
            const id = document.getElementById('loginId').value.trim();
            const pw = document.getElementById('loginPw').value.trim();

            if (!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");

            const dummyEmail = `${id}@kimmath.com`;
            const btn = document.getElementById('loginSubmitBtn');
            btn.innerText = "로그인 중...";
            btn.disabled = true;

            try {
                // 파이어베이스 Auth 로그인 시도
                await signInWithEmailAndPassword(auth, dummyEmail, pw);
                alert("로그인 성공! 응원합니다!");
                
                window.showSection(pendingTarget || 'home');
                pendingTarget = null;
                
                document.getElementById('loginId').value = '';
                document.getElementById('loginPw').value = '';
            } catch (error) {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            } finally {
                btn.innerText = "로그인";
                btn.disabled = false;
            }
        };

        window.performLogout = async function() {
            try {
                await signOut(auth);
                alert("로그아웃 되었습니다.");
                window.showSection('home');
            } catch (error) {
                console.error("로그아웃 오류", error);
            }
        };

        // =====================================================================
        // 렌더링 로직 (공지사항, 강의 등)
        // =====================================================================

        window.viewNotice = function(index) {
            const notice = notices[index];
            document.getElementById('detailTitle').innerText = notice.title;
            document.getElementById('detailDate').innerText = notice.date;
            document.getElementById('detailContent').innerHTML = notice.content;
            window.showSection('noticeDetail');
        };

        window.renderNotices = function() {
            const html = notices.map((n, i) => `
                <div class="notice-list-item" onclick="viewNotice(${i})">
                    <strong>${n.title}</strong>
                    <span class="notice-date">${n.date}</span>
                </div>
            `).join('');
            document.getElementById('publicNoticeList').innerHTML = html;
        };

        function getYouTubeVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.renderDynamicCourses = function(type) {
            const container = document.getElementById(type + 'ContentContainer');
            container.innerHTML = ''; 
            let html = '';

            if (!currentUser) return; // 미로그인 방어 로직

            Object.keys(courseData).forEach(code => {
                if (currentUser.code === code) {
                    const board = courseData[code];
                    let items = [];

                    if (type === 'videos') {
                        items = board.videos || [];
                    } else if (type === 'materials') {
                        if (typeof classFiles !== 'undefined' && classFiles[code]) {
                            items = classFiles[code].map(file => ({
                                title: `📄 ${file}`,
                                fileName: `./assets/${code}/${file}`,
                                desc: '업데이트된 수업 자료입니다.'
                            }));
                        }
                    }
                    
                    if (items.length > 0) {
                        html += `<div style="margin-bottom: 40px;">`;
                        html += `<div class="board-badge">${board.boardName} 전용 게시판</div>`;
                        
                        items.forEach(item => {
                            let mediaHTML = '';
                            let actionHTML = '';
                            
                            if (type === 'videos') {
                                const ytId = getYouTubeVideoId(item.link);
                                if (ytId) {
                                    mediaHTML = `
                                        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: var(--btn-radius); border: var(--border-width) solid var(--border-color); margin-bottom: 20px; background: #000;">
                                            <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe>
                                        </div>`;
                                } else {
                                    mediaHTML = `<div style="width: 100%; height: 150px; background: var(--bg); border-radius: var(--btn-radius); border: var(--border-width) solid var(--border-color); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;">📺</div>`;
                                    actionHTML = `<button class="btn btn-outline" style="width: 100%; padding: 12px; margin-top: 10px;" onclick="window.open('${item.link}', '_blank')">영상 보기 ▶</button>`;
                                }
                            } else {
                                mediaHTML = `<div style="width: 100%; height: 80px; background: var(--bg); border-radius: var(--btn-radius); border: var(--border-width) solid var(--border-color); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;">📁</div>`;
                                actionHTML = `<a href="${item.fileName}" download class="btn btn-outline" style="display: block; text-align: center; text-decoration: none; width: 100%; box-sizing: border-box; padding: 12px; margin-top: 10px;">다운로드 ⬇</a>`;
                            }

                            html += `
                                <div class="content-card" style="margin-top: 10px;">
                                    ${mediaHTML}
                                    <h3>${item.title}</h3>
                                    <p>${item.desc}</p>
                                    ${actionHTML}
                                </div>
                            `;
                        });
                        html += `</div>`;
                    }
                }
            });

            if (html === '') {
                html = '<p style="text-align: center; color: var(--text-muted);">게시판이 비어있습니다.</p>';
            }
            container.innerHTML = html;
        };
    </script>
</body>
</html>
