name: Update PDF Links

on:
  push:
    paths:
      - 'assets/**/*.pdf' # assets 폴더 안에 PDF가 추가되거나 변경될 때만 실행!

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 목록을 업데이트하고 커밋할 수 있는 권한

    steps:
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 파이썬 스크립트 실행 (목록 업데이트)
        run: python update_list.py

      - name: 변경된 파일 리스트를 GitHub에 자동 커밋하기
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add file_list.js
          # 변경사항이 있을 때만 커밋하도록 설정
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: PDF 파일 목록 자동 업데이트" && git push)